{% extends 'base.html' %}
{% block title %}Delete Listing — UniCart{% endblock %}
{% block content %}

<h1>Delete "{{ listing.title }}"?</h1>
<p>This cannot be undone.</p>

<form method="POST">
  {% csrf_token %}
  <button type="submit">Yes, delete it</button>
  <a href="{% url 'listing_detail' listing.pk %}">Cancel</a>
</form>

{% endblock %}
