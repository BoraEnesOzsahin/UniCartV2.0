{% extends 'base.html' %}
{% block title %}Post a Listing — UniCart{% endblock %}
{% block content %}

<!-- ── CREATE LISTING PAGE ───────────────────
     Data passed from views.py:
       - form → ListingForm instance
──────────────────────────────────────────── -->

<h1>Post a listing</h1>

<form method="POST" enctype="multipart/form-data">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Post listing</button>
</form>

{% endblock %}
