{% extends 'base.html' %}

{% block title %}Email Verified{% endblock %}

{% block content %}
<section class="max-w-2xl mx-auto px-6 py-12">
  <div class="bg-white border border-gray-100 rounded-[2rem] p-8 text-center">
    <div class="text-5xl mb-4">✅</div>
    <h2 class="text-3xl font-black mb-4">Email verified</h2>

    <div class="alert alert-success text-left">
      <p>Your email has been successfully verified.</p>
      <p>You can now log in to your account.</p>
    </div>

    <p class="text-gray-500 mb-6">Welcome to UniCart! Your account is ready to use.</p>
    <div class="flex items-center justify-center gap-3">
      <a href="{% url 'login' %}" class="btn btn-primary">Go to Login</a>
      <a href="{% url 'home' %}" class="btn btn-secondary">Back to Home</a>
    </div>
  </div>
</section>
{% endblock %}
