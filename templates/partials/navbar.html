<!-- Navigation -->
<nav class="flex items-center justify-between px-6 md:px-12 py-6 bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100">
    <div class="flex items-center gap-6">
        <a href="{% url 'home' %}" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
            <h1 class="text-3xl font-extrabold tracking-tighter uppercase">UniCart</h1>
            <span class="bg-uni-orange text-white text-[10px] px-2 py-0.5 rounded-full font-black">BETA</span>
        </a>

        <a href="{% url 'listing_list' %}" class="hidden sm:inline-block text-sm font-bold text-gray-700 hover:text-uni-orange transition-colors">
            Browse
        </a>
    </div>

    <div class="flex items-center gap-6">
        <button id="theme-toggle" type="button" class="hidden sm:inline-flex items-center font-bold text-sm text-gray-700 hover:text-uni-orange transition-colors">
            <svg aria-hidden="true" viewBox="0 0 24 24" class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="7" width="18" height="10" rx="6" />
                <circle class="theme-knob" cx="8.5" cy="12" r="3.5" fill="currentColor" />
            </svg>
        </button>
        {% if user.is_authenticated %}
            <div class="relative hidden sm:block group">
                <button type="button" class="font-bold text-sm text-gray-700 hover:text-uni-orange transition-colors">
                    Account
                </button>
                <div class="absolute right-0 mt-3 w-52 bg-white border border-gray-100 rounded-2xl shadow-xl p-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible group-focus-within:opacity-100 group-focus-within:visible transition-all duration-200">
                    <a href="{% url 'dashboard' %}" class="block px-4 py-3 text-sm font-bold text-gray-600 hover:text-uni-orange hover:bg-orange-50 rounded-xl transition-colors">
                        Dashboard
                    </a>
                    <a href="{% url 'favorite_list' %}" class="block px-4 py-3 text-sm font-bold text-gray-600 hover:text-uni-orange hover:bg-orange-50 rounded-xl transition-colors">
                        Favorites
                    </a>
                    <a href="{% url 'account_settings' %}" class="block px-4 py-3 text-sm font-bold text-gray-600 hover:text-uni-orange hover:bg-orange-50 rounded-xl transition-colors">
                        Settings
                    </a>
                    <div class="my-1 border-t border-gray-200"></div>
                    <a href="{% url 'logout' %}" class="block px-4 py-3 text-sm font-bold text-gray-600 hover:text-uni-orange hover:bg-orange-50 rounded-xl transition-colors">
                        Logout
                    </a>
                </div>
            </div>
        {% else %}
            <a href="{% url 'login' %}" class="font-bold text-sm hidden sm:block">Login</a>
        {% endif %}
        <a href="{% url 'listing_create' %}" class="bg-uni-black text-white px-6 py-3 rounded-full font-bold text-sm hover:bg-uni-orange transition-all duration-300 shadow-lg active:scale-95">
            + Sell item
        </a>
    </div>
</nav>
