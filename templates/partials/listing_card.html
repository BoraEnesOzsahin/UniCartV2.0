<!-- ── LISTING CARD PARTIAL ─────────────────
     Reusable card for a single listing.
     Use with: {% include 'partials/listing_card.html' with listing=listing %}
──────────────────────────────────────────── -->
<a href="{% url 'listing_detail' listing.pk %}" class="listing-card">
  <div class="listing-img">
    {% if listing.image %}
      <img src="{{ listing.image.url }}" alt="{{ listing.title }}">
    {% else %}
      <span>📦</span>
    {% endif %}
    <span class="listing-condition cond-{{ listing.condition }}">
      {{ listing.get_condition_display }}
    </span>
  </div>
  <div class="listing-body">
    <div class="listing-title">{{ listing.title }}</div>
    <div class="listing-meta">{{ listing.category }} · {{ listing.created_at|timesince }} ago</div>
    <div class="listing-footer">
      <div>
        <div class="listing-price">₺{{ listing.price }}</div>
        <div class="listing-seller">by {{ listing.seller.username }}</div>
      </div>
    </div>
  </div>
</a>
